<body><div class="app"><header><section class="hero" aria-labelledby="pageTitle"><div class="hero-top"><div><h1 id="pageTitle">FIFA World Cup 2026<br>Group Stage Calendar</h1><p class="subtitle">A fast, responsive and searchable calendar for the FIFA World Cup 2026 group-stage schedule.</p></div><button class="toggle" id="themeToggle" type="button" aria-label="Toggle dark or light mode">🌙 Dark</button></div><div class="stats" aria-label="Schedule summary"><div class="stat"><b id="totalMatches">0</b><span>Total matches</span></div><div class="stat"><b id="totalTeams">0</b><span>Teams listed</span></div><div class="stat"><b id="nextMatchStat">-</b><span>Next kickoff</span></div></div></section><section class="toolbar" aria-label="Calendar filters"><div><label class="visually-hidden" for="searchInput">Search by team name</label><input class="control" id="searchInput" type="search" placeholder="Search team, e.g. Jordan, Brazil, Canada" autocomplete="off" /></div><div><label class="visually-hidden" for="dateFilter">Filter by date</label><select class="control" id="dateFilter"></select></div><div><label class="visually-hidden" for="teamFilter">Filter by team</label><select class="control" id="teamFilter"></select></div><button class="reset" id="resetBtn" type="button">Show All</button></section></header><main><div class="summary" aria-live="polite"><span id="resultSummary">Showing all matches</span><span class="pill" id="todaySummary">Today: checking schedule</span></div><section class="calendar" id="calendar" aria-label="World Cup group-stage match calendar"></section></main><footer>All times are displayed exactly as provided in the schedule database.</footer></div>

const calendar=document.getElementById('calendar'),searchInput=document.getElementById('searchInput'),dateFilter=document.getElementById('dateFilter'),teamFilter=document.getElementById('teamFilter'),resetBtn=document.getElementById('resetBtn'),themeToggle=document.getElementById('themeToggle'),resultSummary=document.getElementById('resultSummary'),todaySummary=document.getElementById('todaySummary');
const monthMap={Jun:5};const enriched=matches.map((match,index)=>({...match,id:index+1,kickoff:parseKickoff(match.date,match.time)})).sort((a,b)=>a.kickoff-b.kickoff);
function parseKickoff(date,time){const[day,month]=date.split(' ');const[raw,period]=time.split(' ');let[hour,minute]=raw.split(':').map(Number);if(period==='PM'&&hour!==12)hour+=12;if(period==='AM'&&hour===12)hour=0;return new Date(2026,monthMap[month],Number(day),hour,minute)}
function formatLongDate(dateText){const d=parseKickoff(dateText,'12:00 PM');return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}

function setupFilters(){const dates=[...new Set(enriched.map(m=>m.date))];const teams=[...new Set(enriched.flatMap(m=>[m.team1,m.team2]))].sort((a,b)=>a.localeCompare(b));dateFilter.innerHTML='<option value="">All dates</option>'+dates.map(d=>`<option value="${escapeHtml(d)}">${escapeHtml(formatLongDate(d))}</option>`).join('');teamFilter.innerHTML='<option value="">All teams</option>'+teams.map(t=>`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');document.getElementById('totalMatches').textContent=enriched.length;document.getElementById('totalTeams').textContent=teams.length;const next=nextUpcoming();document.getElementById('nextMatchStat').textContent=next?`${next.date}`:'-'}
