<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>World Cup 2026 Prediction Pool</title><style>:root{--g:#00AB61;--d:#1A1A1A;--w:#fff;--m:#777;--l:#e7ebe9}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#f7faf8,#eef4f1);color:var(--d)}.app{max-width:520px;margin:auto;min-height:100vh;padding:22px 18px 95px}.header{background:var(--d);color:white;border-radius:28px;padding:22px;box-shadow:0 18px 45px rgba(0,0,0,.18)}.header h1{margin:0;font-size:27px}.header p{margin:8px 0 0;color:#cfd8d3;font-size:14px}.card,.match{background:white;border:1px solid var(--l);border-radius:24px;padding:18px;margin-top:16px;box-shadow:0 12px 35px rgba(0,0,0,.06)}.tab{display:none;animation:fade .25s ease}.tab.active{display:block}@keyframes fade{from{opacity:.3;transform:translateY(8px)}to{opacity:1;transform:none}}.segment{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}.segment button,.btn{border:0;padding:12px;border-radius:16px;background:#eef4f1;font-weight:800;color:var(--d)}.segment button.active,.btn.primary{background:var(--g);color:white}.meta{font-size:12px;color:var(--m);margin-bottom:14px}.versus{display:grid;grid-template-columns:1fr 70px 1fr;gap:10px;align-items:end}.teamBox{text-align:center;background:#f8faf9;border:1px solid var(--l);border-radius:20px;padding:14px 10px}.flag{font-size:38px;line-height:1}.teamName{font-weight:900;font-size:15px;margin:6px 0 10px}.pick{width:100%;border:1px solid var(--l);background:white;border-radius:15px;padding:11px 8px;font-weight:900}.drawWrap{text-align:center}.drawLabel{font-size:11px;color:var(--m);font-weight:900;margin-bottom:8px}.drawBtn{border:1px solid var(--l);background:#f8faf9;border-radius:999px;padding:10px 8px;font-size:12px;font-weight:900;width:62px}.pick.selected,.drawBtn.selected{background:var(--g);color:white;border-color:var(--g)}input,select{width:100%;padding:14px;border-radius:16px;border:1px solid var(--l);margin-top:8px;font-size:15px;background:white}label{font-size:13px;font-weight:800;color:#444}.jersey{display:flex;justify-content:center;margin:18px 0}table{width:100%;border-collapse:collapse}th,td{padding:12px 8px;border-bottom:1px solid var(--l);text-align:left;font-size:14px}th{color:var(--m);font-size:12px}.rank{width:32px;height:32px;border-radius:50%;background:#eef4f1;display:grid;place-items:center;font-weight:900}.empty{text-align:center;color:var(--m);padding:20px}.status{margin-top:10px;font-size:12px;color:var(--m)}.nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:min(520px,calc(100% - 24px));background:rgba(26,26,26,.96);border-radius:25px;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;backdrop-filter:blur(16px)}.nav button{background:transparent;color:#aaa;border:0;border-radius:18px;padding:10px 4px;font-size:11px;font-weight:800}.nav button.active{background:var(--g);color:white}.small{font-size:12px;color:var(--m)}</style></head><body><div class="app"><div class="header"><h1>World Cup Pool</h1><p>Predict matches, show your jersey, track the leaderboard, and spy on your friends’ picks.</p><div class="status" id="syncStatus">Connecting shared pool...</div></div><section id="matches" class="tab active"><div class="segment"><button class="dayBtn active" data-day="yesterday">Yesterday</button><button class="dayBtn" data-day="today">Today</button><button class="dayBtn" data-day="tomorrow">Tomorrow</button></div><div id="matchesList"></div></section><section id="jersey" class="tab"><div class="card"><label>Nickname</label><input id="nickname" placeholder="Enter your name"><label style="display:block;margin-top:14px">Team Jersey</label><select id="jerseyStyle"><option value="brazil">Brazil</option><option value="italy">Italy</option><option value="germany">Germany</option><option value="france">France</option><option value="argentina">Argentina</option><option value="england">England</option><option value="portugal">Portugal</option><option value="spain">Spain</option></select><div class="jersey" id="jerseyPreview"></div><button class="btn primary" onclick="saveProfile()">Save Profile</button><p class="small">Register by entering your nickname, choosing a jersey, then tapping Save Profile.</p></div></section><section id="leaderboard" class="tab"><div class="card"><button class="btn primary" onclick="loadPool()">Refresh Leaderboard</button><div id="leaderboardTable"></div></div></section><section id="friends" class="tab"><div class="card"><label>Select Friend</label><select id="friendSelect" onchange="renderFriendPicks()"></select><div id="friendPicks"></div></div></section></div><nav class="nav"><button class="navBtn active" data-tab="matches">Matches</button><button class="navBtn" data-tab="jersey">My Jersey</button><button class="navBtn" data-tab="leaderboard">Leaderboard</button><button class="navBtn" data-tab="friends">Friends</button></nav><script>const STORAGE_KEY="fifa-world-cup-2026-rawad-pool-v1";const API_BASE="https://api.jsonstorage.net/v1/json";const flags={Mexico:"🇲🇽","South Africa":"🇿🇦",Canada:"🇨🇦","Bosnia and Herzegovina":"🇧🇦",USA:"🇺🇸",Paraguay:"🇵🇾",Australia:"🇦🇺",Turkey:"🇹🇷","South Korea":"🇰🇷",Czechia:"🇨🇿"};const teams={brazil:{name:"Brazil",main:"#FFDF00",second:"#009739",third:"#002776",pattern:"chevron"},italy:{name:"Italy",main:"#0066B3",second:"#FFFFFF",third:"#009246",pattern:"stripe"},germany:{name:"Germany",main:"#FFFFFF",second:"#111111",third:"#DD0000",pattern:"band"},france:{name:"France",main:"#1D3D8F",second:"#FFFFFF",third:"#E1000F",pattern:"side"},argentina:{name:"Argentina",main:"#75AADB",second:"#FFFFFF",third:"#F6B40E",pattern:"stripes"},england:{name:"England",main:"#FFFFFF",second:"#C8102E",third:"#1A1A1A",pattern:"cross"},portugal:{name:"Portugal",main:"#C8102E",second:"#006A44",third:"#FFCC00",pattern:"split"},spain:{name:"Spain",main:"#C60B1E",second:"#FFC400",third:"#111111",pattern:"band"}};let remoteReady=false;const matches=[{id:"m1",day:"yesterday",time:"11 Jun 2026 · 10:00 PM UAE",venue:"Mexico City",a:"Mexico",b:"South Africa",result:"Mexico"},{id:"m2",day:"today",time:"12 Jun 2026 · 9:00 PM UAE",venue:"Toronto",a:"Canada",b:"Bosnia and Herzegovina",result:null},{id:"m3",day:"today",time:"13 Jun 2026 · 12:00 AM UAE",venue:"Los Angeles",a:"USA",b:"Paraguay",result:null},{id:"m4",day:"tomorrow",time:"13 Jun 2026 · 9:00 PM UAE",venue:"Vancouver",a:"Australia",b:"Turkey",result:null},{id:"m5",day:"tomorrow",time:"14 Jun 2026 · 12:00 AM UAE",venue:"Guadalajara",a:"South Korea",b:"Czechia",result:null}];let pool={users:{},updatedAt:new Date().toISOString()};let activeDay="today";function status(t){document.getElementById("syncStatus").textContent=t}async function remoteGet(){const r=await fetch(API_BASE+"?id="+encodeURIComponent(STORAGE_KEY)+"&cb="+Date.now());if(!r.ok)throw new Error("GET failed");const data=await r.json();return data&&data.users?data:{users:{},updatedAt:new Date().toISOString()}}async function remotePut(data){const r=await fetch(API_BASE+"?id="+encodeURIComponent(STORAGE_KEY),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});if(!r.ok)throw new Error("POST failed");return r.json()}async function loadPool(){try{pool=await remoteGet();remoteReady=true;localStorage.setItem("wc_pool_cache",JSON.stringify(pool));status("Shared pool connected · live sync on · UAE time")}catch(e){const l=localStorage.getItem("wc_pool_cache");pool=l?JSON.parse(l):pool;status("Shared pool temporarily offline · using local cache · UAE time")}renderAll()}async function savePool(){pool.updatedAt=new Date().toISOString();localStorage.setItem("wc_pool_cache",JSON.stringify(pool));try{await remotePut(pool);remoteReady=true;status("Saved to shared pool · live for everyone · UAE time")}catch(e){status("Could not save online · saved locally only")}}function currentUser(){const n=localStorage.getItem("wc_name");if(!n){alert("Please save your nickname in My Jersey first.");switchTab("jersey");return null}if(!pool.users[n])pool.users[n]={name:n,jersey:localStorage.getItem("wc_jersey")||"brazil",picks:{},streak:0};return pool.users[n]}function pick(id,c){const u=currentUser();if(!u)return;u.picks[id]=c;u.jersey=localStorage.getItem("wc_jersey")||"brazil";savePool();renderMatches();renderLeaderboard();renderFriends()}function scoreUser(u){let p=0,s=0;matches.forEach(m=>{if(m.result&&u.picks[m.id]===m.result){p+=3;s++}});u.streak=s;return p}function renderMatches(){const n=localStorage.getItem("wc_name"),u=n?pool.users[n]:null,l=document.getElementById("matchesList");l.innerHTML="";matches.filter(m=>m.day===activeDay).forEach(m=>{const s=u?.picks?.[m.id];l.innerHTML+=`<div class="match"><div class="meta">${m.time} · ${m.venue}</div><div class="versus"><div class="teamBox"><div class="flag">${flags[m.a]||'🏳️'}</div><div class="teamName">${m.a}</div><button class="pick ${s===m.a?'selected':''}" onclick="pick('${m.id}','${m.a}')">Win</button></div><div class="drawWrap"><div class="drawLabel">PREDICT</div><button class="drawBtn ${s==='Draw'?'selected':''}" onclick="pick('${m.id}','Draw')">Draw</button></div><div class="teamBox"><div class="flag">${flags[m.b]||'🏳️'}</div><div class="teamName">${m.b}</div><button class="pick ${s===m.b?'selected':''}" onclick="pick('${m.id}','${m.b}')">Win</button></div></div></div>`})}function jerseySvg(t,small=false){const tm=teams[t]||teams.brazil,z=small?42:160;let pat="";if(tm.pattern==="stripes")pat=`<rect x="62" y="32" width="16" height="104" fill="${tm.second}"/><rect x="84" y="32" width="16" height="104" fill="${tm.second}"/>`;if(tm.pattern==="band")pat=`<rect x="54" y="68" width="52" height="14" fill="${tm.second}"/><rect x="54" y="84" width="52" height="12" fill="${tm.third}"/>`;if(tm.pattern==="chevron")pat=`<path d="M56 58 L80 78 L104 58 L104 72 L80 92 L56 72 Z" fill="${tm.second}"/><path d="M62 63 L80 78 L98 63" fill="none" stroke="${tm.third}" stroke-width="6"/>`;if(tm.pattern==="stripe")pat=`<rect x="76" y="32" width="10" height="104" fill="${tm.second}"/><rect x="88" y="32" width="6" height="104" fill="${tm.third}"/>`;if(tm.pattern==="side")pat=`<rect x="52" y="34" width="10" height="102" fill="${tm.second}"/><rect x="98" y="34" width="10" height="102" fill="${tm.third}"/>`;if(tm.pattern==="cross")pat=`<rect x="76" y="34" width="9" height="102" fill="${tm.second}"/><rect x="54" y="76" width="52" height="9" fill="${tm.second}"/>`;if(tm.pattern==="split")pat=`<rect x="52" y="32" width="26" height="104" fill="${tm.second}"/><rect x="78" y="72" width="12" height="12" rx="6" fill="${tm.third}"/>`;return`<svg width="${z}" height="${z}" viewBox="0 0 160 160"><path d="M50 30 L70 18 H90 L110 30 L138 48 L120 76 L108 66 V138 H52 V66 L40 76 L22 48 Z" fill="${tm.main}" stroke="#1A1A1A" stroke-width="5"/>${pat}<path d="M70 18 Q80 36 90 18" fill="${tm.second}"/><circle cx="80" cy="56" r="11" fill="rgba(255,255,255,.55)"/><text x="80" y="63" text-anchor="middle" font-size="16" font-weight="900" fill="#1A1A1A">26</text><text x="80" y="124" text-anchor="middle" font-size="13" font-weight="900" fill="#1A1A1A">${tm.name}</text></svg>`}function renderJersey(){document.getElementById("nickname").value=localStorage.getItem("wc_name")||"";let j=localStorage.getItem("wc_jersey")||"brazil";if(!teams[j])j="brazil";document.getElementById("jerseyStyle").value=j;document.getElementById("jerseyPreview").innerHTML=jerseySvg(j)}function saveProfile(){const n=document.getElementById("nickname").value.trim(),j=document.getElementById("jerseyStyle").value;if(!n)return alert("Enter a nickname first.");localStorage.setItem("wc_name",n);localStorage.setItem("wc_jersey",j);if(!pool.users[n])pool.users[n]={name:n,jersey:j,picks:{},streak:0};pool.users[n].jersey=j;savePool();renderAll();alert("Profile saved. You are registered in the pool.")}function renderLeaderboard(){const users=Object.values(pool.users).map(u=>({...u,points:scoreUser(u)})).sort((a,b)=>b.points-a.points),box=document.getElementById("leaderboardTable");if(!users.length){box.innerHTML='<div class="empty">No players yet.</div>';return}box.innerHTML=`<table><thead><tr><th>#</th><th>Player</th><th>Pts</th><th>Streak</th></tr></thead><tbody>${users.map((u,i)=>`<tr><td><div class="rank">${i+1}</div></td><td>${jerseySvg(u.jersey,true)}<br><b>${u.name}</b></td><td><b>${u.points}</b></td><td>🔥 ${u.streak||0}</td></tr>`).join("")}</tbody></table>`}function renderFriends(){const s=document.getElementById("friendSelect"),users=Object.values(pool.users);s.innerHTML=users.map(u=>`<option value="${u.name}">${u.name}</option>`).join("");renderFriendPicks()}function renderFriendPicks(){const n=document.getElementById("friendSelect").value,u=pool.users[n],b=document.getElementById("friendPicks");if(!u){b.innerHTML='<div class="empty">No friends joined yet.</div>';return}b.innerHTML=matches.filter(m=>m.day==="today"||m.day==="tomorrow").map(m=>`<div class="match"><div class="meta">${m.time} · ${m.venue}</div><b>${flags[m.a]||''} ${m.a} vs ${flags[m.b]||''} ${m.b}</b><p>${n} picked: <b style="color:var(--g)">${u.picks[m.id]||"No pick yet"}</b></p></div>`).join("")}function renderAll(){renderMatches();renderJersey();renderLeaderboard();renderFriends()}function switchTab(id){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".navBtn").forEach(b=>b.classList.toggle("active",b.dataset.tab===id))}document.querySelectorAll(".navBtn").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));document.querySelectorAll(".dayBtn").forEach(b=>b.onclick=()=>{activeDay=b.dataset.day;document.querySelectorAll(".dayBtn").forEach(x=>x.classList.remove("active"));b.classList.add("active");renderMatches()});document.getElementById("jerseyStyle").onchange=e=>document.getElementById("jerseyPreview").innerHTML=jerseySvg(e.target.value);loadPool();setInterval(loadPool,8000);</script></body></html>
