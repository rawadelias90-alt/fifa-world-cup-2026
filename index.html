<div id="profileExport" class="shareCard"><div class="shareSub">World Cup Pool 2026</div><div class="jersey" id="jerseyPreview"></div><div class="shareName" id="profileNamePreview">Your Name</div></div><button class="btn primary" onclick="saveProfile()">Save Profile</button><button class="btn share" onclick="shareProfile()">Share Profile PNG</button><p class="small">Register by entering your nickname, choosing a jersey, then tap Save Profile.</p></div></section><section id="leaderboard" class="tab"><div class="card"><button class="btn primary" onclick="loadPool()">Refresh Leaderboard</button><div id="leaderboardTable"></div></div></section><section id="friends" class="tab"><div class="card"><label>Select Friend</label><select id="friendSelect" onchange="renderFriendPicks()"></select><div id="friendPicks"></div></div></section></div><nav class="nav"><button class="navBtn active" data-tab="matches">Matches</button><button class="navBtn" data-tab="jersey">My Jersey</button><button class="navBtn" data-tab="leaderboard">Leaderboard</button><button class="navBtn" data-tab="friends">Friends</button></nav><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";import{getFirestore,doc,getDoc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyD3d8wFq-CdorBN5nRKRnzfinbvtXPKJ68",authDomain:"worldcup-prediction-pool-79fda.firebaseapp.com",projectId:"worldcup-prediction-pool-79fda",storageBucket:"worldcup-prediction-pool-79fda.firebasestorage.app",messagingSenderId:"190798006329",appId:"1:190798006329:web:99f024005cfbcf3f10e5e8",measurementId:"G-EYYGLTDN01"};const app=initializeApp(firebaseConfig),db=getFirestore(app),poolRef=doc(db,"pools","main");const stadiumSlides=[{name:"AT&T Stadium",city:"Arlington (Dallas), Texas",capacity:"94,000",img:"https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=1200&q=85"},{name:"Estadio Az es.unsplash.com/photo-1505842465776-3f8d91742a32?auto=format&fit=crop&w=1200&q=85"},{name:"Estadio BBVA",city:"Monterrey, Mexico",capacity:"53,500",img:"https://images.unsplash.com/photo-1487466365202-1afdb86c764e?auto=format&fit=crop&w=1200&q=85"},{name:"Estadio Akron",city:"Guadalajara, Mexico",capacity:"48,000",img:"https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?auto=format&fit=crop&w=1200&q=85"},{name:"BMO Field",city:"Toronto, Canada",capacity:"45,000",img:"https://images.unsplash.com/photo-1518091043644-c1d4457512c6?auto=format&fit=crop&w=1200&q=85"}];let slideIndex=0;function renderStadiumSlide(){const s=stadiumSlides[slideIndex%stadiumSlides.length];document.getElementById("headerBg").style.backgroundImage=`url('${s.img}')`;document.getElementById("stadiumName").textContent=s.name;document.getElementById("stadiumDetails").textContent=`${s.city} · Capacity ${s.capacity}`;slideIndex++}setInterval(renderStadiumSlide,5000);let audioMuted=localStorage.getItem("wc_audio_muted")==="1",audioCtx=null;function vibrate(p){if("vibrate"in navigator)navigator.vibrate(p)}function updateSoundIcon(){const b=document.getElementById("soundToggle");if(b)b.textContent=audioMuted?"🔇":"🔊"}function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx}function tone(f,s,d,type="sine",gain=.06){if(audioMuted)return;const c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.setValueAtTime(f,c.currentTime+s);g.gain.setValueAtTime(0,c.currentTime+s);g.gain.linearRampToValueAtTime(gain,c.currentTime+s+.01);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+s+d);o.connect(g);g.connect(c.destination);o.start(c.currentTime+s);o.stop(c.currentTime+s+d+.02)}function playTabSound(){tone(520,0,.07,"sine",.045);tone(700,.055,.09,"sine",.04)}function playWhistle(){tone(1650,0,.16,"square",.035);tone(2150,.08,.22,"square",.028);tone(1850,.22,.12,"sine",.025)}function toggleSound(){audioMuted=!audioMuted;localStorage.setItem("wc_audio_muted",audioMuted?"1":"0");updateSoundIcon();vibrate(15);if(!audioMuted)playTabSound()}const flags={Mexico:"🇲🇽","South Africa":"🇿🇦",Canada:"🇨🇦","Bosnia and Herzegovina":"🇧🇦",USA:"🇺🇸",Paraguay:"🇵🇾",Australia:"🇦🇺",Turkey:"🇹🇷","South Korea":"🇰🇷",Czechia:"🇨🇿"};const teams={brazil:{name:"Brazil",main:"#FFDF00"},italy:{name:"Italy",main:"#0066B3"},germany:{name:"Germany",main:"#FFFFFF"},france:{name:"France",main:"#1D3D8F"},argentina:{name:"Argentina",main:"#75AADB"},england:{name:"England",main:"#FFFFFF"},portugal:{name:"Portugal",main:"#C8102E"},spain:{name:"Spain",main:"#C60B1E"}};const matches=[{id:"m1",day:"yesterday",kickoff:"2026-06-11T22:00:00+04:00",time:"11 Jun 2026 · 10:00 PM UAE",venue:"Mexico City",a:"Mexico",b:"South Africa",result:"Mexico"},{id:"m2",day:"today",kickoff:"2026-06-12T21:00:00+04:00",time:"12 Jun 2026 · 9:00 PM UAE",venue:"Toronto",a:"Canada",b:"Bosnia and Herzegovina",result:null},{id:"m3",day:"today",kickoff:"2026-06-13T00:00:00+04:00",time:"13 Jun 2026 · 12:00 AM UAE",venue:"Los Angeles",a:"USA",b:"Paraguay",result:null},{id:"m4",day:"tomorrow",kickoff:"2026-06-13T21:00:00+04:00",time:"13 Jun 2026 · 9:00 PM UAE",venue:"Vancouver",a:"Australia",b:"Turkey",result:null},{id:"m5",day:"tomorrow",kickoff:"2026-06-14T00:00:00+04:00",time:"14 Jun 2026 · 12:00 AM UAE",venue:"Guadalajara",a:"South Korea",b:"Czechia",result:null}];let pool={users:{},updatedAt:new Date().toISOString()},activeDay="today";function status(t){document.getElementById("syncStatus").textContent=t}function isLocked(m){return Date.now()>=new Date(m.kickoff).getTime()}async function loadPool(){try{const s=await getDoc(poolRef);if(s.exists())pool=s.data();else await setDoc(poolRef,pool);localStorage.setItem("wc_pool_cache",JSON.stringify(pool));status("Firebase connected · live sync on · UAE time")}catch(e){const l=localStorage.getItem("wc_pool_cache");pool=l?JSON.parse(l):pool;status("Firebase not ready · check Firestore rules")}renderAll()}async function savePool(){pool.updatedAt=new Date().toISOString();localStorage.setItem("wc_pool_cache",JSON.stringify(pool));try{await setDoc(poolRef,pool,{merge:true});status("Saved to Firebase · live for everyone")}catch(e){status("Save blocked · check Firestore rules")}}try{onSnapshot(poolRef,s=>{if(s.exists()){pool=s.data();localStorage.setItem("wc_pool_cache",JSON.stringify(pool));status("Firebase connected · live sync on · UAE time");renderAll()}},e=>status("Firebase listener blocked"))}catch(e){}function currentUser(){const n=localStorage.getItem("wc_name");if(!n){alert("Please save your nickname in My Jersey first.");switchTab("jersey");return null}if(!pool.users[n])pool.users[n]={name:n,jersey:localStorage.getItem("wc_jersey")||"brazil",picks:{},streak:0};return pool.users[n]}function pick(id,c){const m=matches.find(x=>x.id===id);if(m&&isLocked(m)){alert("This match is locked because kickoff has passed.");renderMatches();return}const u=currentUser();if(!u)return;u.picks[id]=c;u.jersey=localStorage.getItem("wc_jersey")||"brazil";vibrate([10,30,10]);playWhistle();savePool();renderAll()}function scoreUser(u){let p=0,s=0;matches.forEach(m=>{if(m.result&&u.picks&&u.picks[m.id]===m.result){p+=3;s++}});u.streak=s;return p}function renderMatches(){const n=localStorage.getItem("wc_name"),u=n?pool.users[n]:null,l=document.getElementById("matchesList");l.innerHTML="";matches.filter(m=>m.day===activeDay).forEach(m=>{const s=u?.picks?.[m.id],locked=isLocked(m),disabled=locked?"disabled":"",badge=locked?'<div class="lockedBadge">🔒 Locked</div>':'';l.innerHTML+=`<div class="match ${locked?'locked':''}"><div class="meta">${m.time} · ${m.venue}</div>${badge}<div class="versus"><div class="teamBox"><div class="flag">${flags[m.a]||'🏳️'}</div><div class="teamName">${m.a}</div><button ${disabled} class="pick ${s===m.a?'selected':''}" onclick="pick('${m.id}','${m.a}')">${locked?'Locked':'Win'}</button></div><div class="drawWrap"><div class="drawLabel">PREDICT</div><button ${disabled} class="drawBtn ${s==='Draw'?'selected':''}" onclick="pick('${m.id}','Draw')">${locked?'🔒':'Draw'}</button></div><div class="teamBox"><div class="flag">${flags[m.b]||'🏳️'}</div><div class="teamName">${m.b}</div><button ${disabled} class="pick ${s===m.b?'selected':''}" onclick="pick('${m.id}','${m.b}')">${locked?'Locked':'Win'}</button></div></div></div>`})}function jerseySvg(t,small=false){const tm=teams[t]||teams.brazil,z=small?46:210;return`<svg width="${z}" height="${z}" viewBox="0 0 160 160"><ellipse cx="80" cy="145" rx="47" ry="8" fill="#000" opacity=".18"/><path d="M50 30 L70 18 H90 L110 30 L138 48 L120 76 L108 66 V138 H52 V66 L40 76 L22 48 Z" fill="${tm.main}" stroke="#161616" stroke-width="4"/><circle cx="80" cy="57" r="12" fill="rgba(255,255,255,.62)"/><text x="80" y="64" text-anchor="middle" font-size="17" font-weight="900" fill="#1A1A1A">26</text><text x="80" y="123" text-anchor="middle" font-size="12" font-weight="900" fill="#1A1A1A">${tm.name}</text></svg>`}function renderJersey(){document.getElementById("nickname").value=localStorage.getItem("wc_name")||"";let j=localStorage.getItem("wc_jersey")||"brazil";if(!teams[j])j="brazil";document.getElementById("jerseyStyle").value=j;document.getElementById("jerseyPreview").innerHTML=jerseySvg(j);document.getElementById("profileNamePreview").textContent=document.getElementById("nickname").value.trim()||"Your Name"}function saveProfile(){const n=document.getElementById("nickname").value.trim(),j=document.getElementById("jerseyStyle").value;if(!n)return alert("Enter a nickname first.");localStorage.setItem("wc_name",n);localStorage.setItem("wc_jersey",j);if(!pool.users[n])pool.users[n]={name:n,jersey:j,picks:{},streak:0};pool.users[n].jersey=j;savePool();renderAll();alert("Profile saved. You are registered in the pool.")}async function shareProfile(){const n=document.getElementById("nickname").value.trim()||localStorage.getItem("wc_name")||"World Cup Player";document.get l(".navBtn").forEach(b=>b.classList.toggle("active",b.dataset.tab===id));vibrate(15);playTabSound()}document.querySelectorAll(".navBtn").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));document.querySelectorAll(".dayBtn").forEach(b=>b.onclick=()=>{activeDay=b.dataset.day;document.querySelectorAll(".dayBtn").forEach(x=>x.classList.remove("active"));b.classList.add("active");vibrate(15);playTabSound();renderMatches()});document.getElementById("jerseyStyle").onchange=e=>document.getElementById("jerseyPreview").innerHTML=jerseySvg(e.target.value);document.getElementById("nickname").oninput=e=>document.getElementById("profileNamePreview").textContent=e.target.value.trim()||"Your Name";window.pick=pick;window.saveProfile=saveProfile;window.loadPool=loadPool;window.renderFriendPicks=renderFriendPicks;window.shareProfile=shareProfile;window.toggleSound=toggleSound;renderStadiumSlide();updateSoundIcon();loadPool();setInterval(renderMatches,30000);</script></body></html>
