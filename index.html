function jerseySvg(t,small=false){const tm=teams[t]||teams.brazil,z=small?46:210;let pat="";if(tm.pattern==="stripes")pat=`<rect x="61" y="31" width="17" height="106" fill="${tm.second}" opacity=".95"/><rect x="84" y="31" width="17" height="106" fill="${tm.second}" opacity=".95"/>`;if(tm.pattern==="band")pat=`<rect x="52" y="68" width="56" height="15" rx="3" fill="${tm.second}"/><rect x="52" y="86" width="56" height="12" rx="3" fill="${tm.third}"/>`;if(tm.pattern==="chevron")pat=`<path d="M55 57 L80 78 L105 57 L105 73 L80 95 L55 73 Z" fill="${tm.second}"/><path d="M62 63 L80 78 L98 63" fill="none" stroke="${tm.third}" stroke-width="6"/>`;if(tm.pattern==="stripe")pat=`<rect x="76" y="31" width="10" height="106" fill="${tm.second}"/><rect x="89" y="31" width="7" height="106" fill="${tm.third}"/>`;if(tm.pattern==="side")pat=`<rect x="52" y="34" width="10" height="102" fill="${tm.second}"/><rect x="98" y="34" width="10" height="102" fill="${tm.third}"/>`;if(tm.pattern==="cross")pat=`<rect x="76" y="34" width="9" height="102" fill="${tm.second}"/><rect x="54" y="76" width="52" height="9" fill="${tm.second}"/>`;if(tm.pattern==="split")pat=`<rect x="51" y="31" width="28" height="106" fill="${tm.second}"/><circle cx="83" cy="77" r="8" fill="${tm.third}"/>`;if(tm.pattern==="jordan")pat=`<rect x="52" y="67" width="56" height="13" rx="3" fill="#111111"/><rect x="52" y="84" width="56" height="13" rx="3" fill="${tm.third}"/><path d="M52 35 L79 78 L52 121 Z" fill="${tm.second}"/><polygon points="62,72 65,77 71,77 66,81 68,87 62,83 56,87 58,81 53,77 59,77" fill="#FFFFFF"/>`;return`<svg width="${z}" height="${z}" viewBox="0 0 160 160"><defs><linearGradient id="g${t}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".35"/><stop offset=".22" stop-color="${tm.main}"/><stop offset=".72" stop-color="${tm.main}"/><stop offset="1" stop-color="#000" stop-opacity=".25"/></linearGradient><radialGradient id="sh${t}" cx="50%" cy="40%" r="70%"><stop offset="0" stop-color="#fff" stop-opacity=".38"/><stop offset=".55" stop-color="#fff" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity=".22"/></radialGradient><filter id="ds${t}" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000" flood-opacity=".25"/></filter></defs><ellipse cx="80" cy="145" rx="47" ry="8" fill="#000" opacity=".18"/><path filter="url(#ds${t})" d="M50 30 L70 18 H90 L110 30 L138 48 L120 76 L108 66 V138 H52 V66 L40 76 L22 48 Z" fill="url(#g${t})" stroke="#161616" stroke-width="4"/>${pat}<path d="M53 35 C66 42 94 42 107 35" fill="none" stroke="#fff" stroke-opacity=".25" stroke-width="3"/><path d="M70 18 Q80 38 90 18" fill="${tm.second}" stroke="#161616" stroke-width="2"/><circle cx="80" cy="57" r="12" fill="rgba(255,255,255,.62)"/><text x="80" y="64" text-anchor="middle" font-size="17" font-weight="900" fill="#1A1A1A">26</text><text x="80" y="123" text-anchor="middle" font-size="12" font-weight="900" fill="#1A1A1A">${tm.name}</text><path d="M50 30 L70 18 H90 L110 30 L138 48 L120 76 L108 66 V138 H52 V66 L40 76 L22 48 Z" fill="url(#sh${t})"/></svg>`}
function renderJersey(){document.getElementById("nickname").value=localStorage.getItem("wc_name")||"";let j=localStorage.getItem("wc_jersey")||"brazil";if(!teams[j])j="brazil";document.getElementById("jerseyStyle").value=j;document.getElementById("jerseyPreview").innerHTML=jerseySvg(j);document.getElementById("profileNamePreview").textContent=document.getElementById("nickname").value.trim()||"Your Name"}function saveProfile(){const n=document.getElementById("nickname").value.trim(),j=document.getElementById("jerseyStyle").value;if(!n)return alert("Enter a nickname first.");localStorage.setItem("wc_name",n);localStorage.setItem("wc_jersey",j);if(!pool.users[n])pool.users[n]={name:n,jersey:j,picks:{},streak:0};pool.users[n].jersey=j;savePool();renderAll();alert("Profile saved. You are registered in the pool.")}async function shareProfile(){const n=document.getElementById("nickname").value.trim()||localStorage.getItem("wc_name")||"World Cup Player";document.getElementById("profileNamePreview").textContent=n;if(!window.html2canvas)return alert("Image exporter is still loading.");const canvas=await html2canvas(document.getElementById("profileExport"),{backgroundColor:null,scale:3,useCORS:true});const a=document.createElement("a");a.download="my-worldcup-jersey.png";a.href=canvas.toDataURL("image/png");a.click()}
function renderLeaderboard(){const users=Object.values(pool.users||{}).map(u=>({...u,points:scoreUser(u)})).sort((a,b)=>b.points-a.points),box=document.getElementById("leaderboardTable");if(!users.length){box.innerHTML='<div class="empty">No players yet.</div>';return}box.innerHTML=`<table><thead><tr><th>#</th><th>Player</th><th>Pts</th><th>Streak</th></tr></thead><tbody>${users.map((u,i)=>`<tr><td><div class="rank">${i+1}</div></td><td>${jerseySvg(u.jersey,true)}<br><b>${u.name}</b></td><td><b>${u.points}</b></td><td>🔥 ${u.streak||0}</td></tr>`).join("")}</tbody></table>`}function renderFriends(){const s=document.getElementById("friendSelect"),users=Object.values(pool.users||{});s.innerHTML=users.map(u=>`<option value="${u.name}">${u.name}</option>`).join("");renderFriendPicks()}function renderFriendPicks(){const n=document.getElementById("friendSelect").value,u=pool.users?pool.users[n]:null,b=document.getElementById("friendPicks");if(!u){b.innerHTML='<div class="empty">No friends joined yet.</div>';return}b.innerHTML=matches.filter(m=>m.day==="today"||m.day==="tomorrow").map(m=>`<div class="match"><div class="meta">${m.time} · ${m.venue} ${isLocked(m)?'· 🔒 Locked':''}</div><b>${flags[m.a]||''} ${m.a} vs ${flags[m.b]||''} ${m.b}</b><p>${n} picked: <b style="color:var(--green)">${u.picks?.[m.id]||"No pick yet"}</b></p></div>`).join("")}
function renderAll(){renderMatches();renderJersey();renderLeaderboard();renderFriends();updateSoundIcon()}function switchTab(id){activeTab=id;heroIndex=0;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".navBtn").forEach(b=>b.classList.toggle("active",b.dataset.tab===id));renderHero();vibrate(15);playTabSound()}document.querySelectorAll(".navBtn").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));document.querySelectorAll(".dayBtn").forEach(b=>b.onclick=()=>{activeDay=b.dataset.day;document.querySelectorAll(".dayBtn").forEach(x=>x.classList.remove("active"));b.classList.add("active");vibrate(15);playTabSound();renderMatches()});document.getElementById("jerseyStyle").onchange=e=>document.getElementById("jerseyPreview").innerHTML=jerseySvg(e.target.value);document.getElementById("nickname").oninput=e=>document.getElementById("profileNamePreview").textContent=e.target.value.trim()||"Your Name";window.pick=pick;window.saveProfile=saveProfile;window.loadPool=loadPool;window.renderFriendPicks=renderFriendPicks;window.shareProfile=shareProfile;window.toggleSound=toggleSound;renderHero();updateSoundIcon();loadPool();setInterval(renderHero,5000);setInterval(renderMatches,30000);
</script>
